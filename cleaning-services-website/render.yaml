services:
  - type: web
    name: navya-cleaning-april
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: NEXT_TELEMETRY_DISABLED
        value: 1
      - key: DB_PATH
        value: /var/lib/data/mythos.db
    disk:
      name: mythos-db
      mountPath: /var/lib/data
      sizeGB: 1

services:
  - type: web
    name: navya-mythos-cleaning
    env: node
    region: oregon
    plan: free
    rootDir: cleaning-services-website
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: mythos-postgres
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: mythos-postgres
    databaseName: mythos
    plan: free

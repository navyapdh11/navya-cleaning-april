services:
  - type: web
    name: march-cleaning
    env: node
    plan: starter
    buildCommand: cd cleaning-services-website && npm install && npm run build
    startCommand: cd cleaning-services-website && npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: DB_PATH
        value: /var/lib/data/mythos.db
    disk:
      name: mythos-db
      mountPath: /var/lib/data
      sizeGB: 1

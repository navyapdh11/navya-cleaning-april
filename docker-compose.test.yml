version: '3.8'
services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: mythos_test_db
    ports:
      - "5433:5432"
    volumes:
      - test_db_data:/var/lib/postgresql/data

  test-mesh:
    build: 
      context: .
      dockerfile: Dockerfile.test
    ports:
      - "8080:8080"
    depends_on:
      - test-db

volumes:
  test_db_data:
